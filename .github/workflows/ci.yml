name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  host-checks:
    name: Host Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: npm ci

      - name: Install Linux native binaries
        run: |
          # npm ci on a Windows-generated lockfile can miss Linux optional native packages.
          LIGHTNINGCSS_VERSION="$(node -p "require('./frontend/package.json').optionalDependencies['lightningcss-linux-x64-gnu']")"
          TAILWIND_OXIDE_VERSION="$(node -p "require('./frontend/package.json').optionalDependencies['@tailwindcss/oxide-linux-x64-gnu']")"
          ROLLUP_VERSION="$(node -p "require('./package-lock.json').packages['node_modules/rollup'].optionalDependencies['@rollup/rollup-linux-x64-gnu']")"
          npm install --workspace frontend --no-save --ignore-scripts \
            "lightningcss-linux-x64-gnu@${LIGHTNINGCSS_VERSION}" \
            "@tailwindcss/oxide-linux-x64-gnu@${TAILWIND_OXIDE_VERSION}"
          npm install --no-save --ignore-scripts \
            "@rollup/rollup-linux-x64-gnu@${ROLLUP_VERSION}"

      - name: Prepare frontend CI environment
        run: cp frontend/.env.example frontend/.env.local

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Protocol unit tests
        run: npm run protocol:unit

  protocol-container:
    name: Protocol Container Checks
    runs-on: ubuntu-latest
    needs: host-checks
    timeout-minutes: 60
    env:
      DOCKER_BUILDKIT: 1
      COMPOSE_DOCKER_CLI_BUILD: 1

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build workspace container
        run: docker compose build workspace

      - name: Anchor build
        run: |
          docker compose run --rm workspace bash -lc "NO_DNA=1 npm install && NO_DNA=1 npm run protocol:build"

      - name: Anchor test
        run: |
          docker compose run --rm workspace bash -lc "mkdir -p /root/.config/solana && if [ ! -f /root/.config/solana/id.json ]; then solana-keygen new --no-bip39-passphrase --silent -f -o /root/.config/solana/id.json; fi && NO_DNA=1 npm install && NO_DNA=1 npm run protocol:test"
